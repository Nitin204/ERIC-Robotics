<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insight.IO – ERIC Robotics Dashboard</title>
  <link rel="stylesheet" href="src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- ── TOP STATUS BAR ── -->
  <header class="top-bar">
    <div class="logo">
      <span class="logo-text">ERIC</span>
      <span class="logo-sub">ROBOTICS</span>
    </div>

    <div class="status-center">
      <div class="mission-status">
        <span class="status-label">Status</span>
        <span class="status-value">On Mission 1234</span>
        <button class="pause-btn" id="pauseBtn" title="Pause Mission">&#9646;&#9646;</button>
      </div>

      <div class="system-indicators">
        <div class="indicator">
          <div class="battery-icon">
            <div class="battery-fill" id="batteryFill"></div>
          </div>
          <span class="indicator-val" id="batteryVal">100%</span>
        </div>
        <div class="indicator">
          <span class="signal-bars" id="signalBars">
            <span></span><span></span><span></span><span></span>
          </span>
          <span class="indicator-val">Strong</span>
        </div>
        <div class="indicator">
          <span class="dot dot-ok"></span>
          <span class="indicator-label">Failsafe</span>
          <span class="indicator-val ok">Okay</span>
        </div>
        <div class="indicator">
          <span class="dot dot-ok"></span>
          <span class="indicator-label">System</span>
          <span class="indicator-val ok">Okay</span>
        </div>
      </div>
    </div>

    <div class="mode-controls">
      <span class="mode-label">MODE</span>
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeAuto">AUTO</button>
        <button class="mode-btn" id="modeManual">MANUAL</button>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <!-- ── SIDEBAR ── -->
    <nav class="sidebar">
      <button class="nav-btn active" title="Dashboard" data-tip="Dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="nav-btn" title="Map" data-tip="Map">
        <svg viewBox="0 0 24 24"><polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      </button>
      <button class="nav-btn" title="Goals" data-tip="Goals">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
      </button>
      <button class="nav-btn" title="Zones" data-tip="Zones">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18" stroke-width="1"/></svg>
      </button>
      <button class="nav-btn" title="Camera" data-tip="Camera">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M2 12C2 12 5 5 12 5s10 7 10 7-3 7-10 7S2 12 2 12z"/></svg>
      </button>
      <button class="nav-btn" title="Analytics" data-tip="Analytics">
        <svg viewBox="0 0 24 24"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      </button>
      <button class="nav-btn bottom" title="Profile" data-tip="Profile">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </button>
    </nav>

    <!-- ── MAIN MAP AREA ── -->
    <main class="map-area">
      <!-- Map header -->
      <div class="map-header">
        <button class="quick-goal-btn" id="quickGoalBtn">
          QUICK GOAL
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,8 16,12 12,16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>

        <div class="map-view-badge">Map View</div>

        <button class="initiate-btn" id="initiateBtn">
          INITIATE
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,8 16,12 12,16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
      </div>

      <!-- The map canvas -->
      <div class="map-canvas" id="mapCanvas">
        <canvas id="mapRender" width="900" height="600"></canvas>

        <!-- Robot icon overlay -->
        <div class="robot-overlay" id="robotOverlay">
          <svg viewBox="0 0 48 48" class="robot-icon">
            <rect x="10" y="18" width="28" height="20" rx="3" fill="#111"/>
            <rect x="16" y="12" width="16" height="10" rx="2" fill="#222"/>
            <circle cx="17" cy="28" r="4" fill="#333" stroke="#555" stroke-width="1.5"/>
            <circle cx="31" cy="28" r="4" fill="#333" stroke="#555" stroke-width="1.5"/>
            <circle cx="24" cy="20" r="2" fill="#4af" opacity="0.9"/>
            <rect x="20" y="10" width="8" height="3" rx="1" fill="#444"/>
            <line x1="24" y1="10" x2="24" y2="7" stroke="#555" stroke-width="1.5"/>
            <circle cx="24" cy="6" r="1.5" fill="#4af"/>
          </svg>
          <div class="robot-pulse"></div>
        </div>

        <!-- Zoom slider -->
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoomIn">+</button>
          <input type="range" class="zoom-slider" id="zoomSlider" min="50" max="200" value="100" orient="vertical" />
          <button class="zoom-btn" id="zoomOut">−</button>
        </div>

        <!-- Camera thumbnail -->
        <div class="camera-thumb" id="cameraThumb">
          <div class="cam-feed" id="camFeed">
            <canvas id="camCanvas" width="240" height="160"></canvas>
            <div class="cam-overlay-text">Click to enter camera view</div>
          </div>
        </div>
      </div>
    </main>

    <!-- ── RIGHT PANEL ── -->
    <aside class="right-panel">
      <!-- Emergency Stop -->
      <button class="estop-btn" id="estopBtn" title="Emergency Stop">
        <div class="estop-ring"></div>
        <div class="estop-inner">
          <svg viewBox="0 0 40 40">
            <path d="M20 5 A15 15 0 1 1 5 20" stroke="#e22" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <path d="M20 5 L16 10 L24 10 Z" fill="#e22"/>
          </svg>
        </div>
        <span class="estop-label">EMERGENCY<br/>STOP</span>
      </button>

      <!-- Directional Pad -->
      <div class="dpad" id="dpad">
        <button class="dpad-btn up" id="dUp" title="Forward (W)">
          <svg viewBox="0 0 24 24"><polyline points="18,15 12,9 6,15"/></svg>
        </button>
        <div class="dpad-row">
          <button class="dpad-btn left" id="dLeft" title="Left (A)">
            <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
          </button>
          <div class="dpad-center">
            <span class="dpad-key">W</span>
            <div class="dpad-middle-row"><span class="dpad-key">A</span><span class="dpad-key accent">D+<br/>key</span><span class="dpad-key">D</span></div>
            <span class="dpad-key">S</span>
          </div>
          <button class="dpad-btn right" id="dRight" title="Right (D)">
            <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
          </button>
        </div>
        <button class="dpad-btn down" id="dDown" title="Backward (S)">
          <svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
        </button>
      </div>
    </aside>
  </div>

  <!-- ── CAMERA MODAL ── -->
  <div class="cam-modal" id="camModal">
    <div class="cam-modal-inner">
      <div class="cam-modal-header">
        <span>Camera Feed</span>
        <button class="cam-close" id="camClose">✕</button>
      </div>
      <canvas id="camModalCanvas" width="640" height="400"></canvas>
      <div class="cam-stats">
        <span>FPS: <b id="camFps">30</b></span>
        <span>RES: <b>1280×720</b></span>
        <span>LAT: <b id="camLat">12ms</b></span>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast" id="toast"></div>

  <script src="src/app.js"></script>
</body>
</html>
